<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOT Radio — Player</title>
<link rel="icon" href="./madyapadma.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --red:      #c8102e;
  --red-dark: #8f0a1f;
  --red-soft: rgba(200,16,46,.07);
  --red-mid:  rgba(200,16,46,.15);
  --bg:       #f7f5f2;
  --surface:  #ffffff;
  --surface2: #f0ece8;
  --border:   #e0d9d2;
  --text:     #1a1210;
  --muted:    #7a6e68;
  --playing:  #1a7a40;
}
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

nav { position:sticky; top:0; z-index:50; background:var(--surface); border-bottom:3px solid var(--red); padding:0 24px; box-shadow:0 2px 16px rgba(200,16,46,.08); }
.nav-inner { max-width:900px; margin:0 auto; display:flex; align-items:center; height:64px; gap:16px; }
.nav-logo { display:flex; align-items:center; text-decoration:none; }
.nav-logo img { height:44px; display:block; }
.nav-back { display:inline-flex; align-items:center; gap:7px; color:var(--muted); text-decoration:none; font-size:12px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; padding:6px 12px; border-radius:7px; border:1.5px solid var(--border); transition:all .2s; }
.nav-back:hover { color:var(--red); border-color:var(--red); background:var(--red-soft); }
.nav-links { display:flex; gap:4px; margin-left:auto; }
.nav-link { padding:6px 14px; border-radius:6px; font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:all .2s; }
.nav-link:hover { color:var(--red); background:var(--red-soft); }

main { max-width:900px; margin:0 auto; padding:32px 24px 60px; }

/* LOADING/ERROR */
#pageLoading { text-align:center; padding:80px 20px; }
.big-spinner { display:inline-block; width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:16px; }
@keyframes spin { to{transform:rotate(360deg)} }
#pageError { text-align:center; padding:80px 20px; display:none; }
.err-icon { font-size:52px; margin-bottom:14px; }
#pageContent { display:none; }

/* PLAYER SECTION */
.player-section { background:var(--surface); border:1.5px solid var(--border); border-top:4px solid var(--red); border-radius:0 0 16px 16px; overflow:hidden; margin-bottom:20px; box-shadow:0 4px 24px rgba(200,16,46,.06); }

.player-cover { width:100%; max-height:220px; object-fit:cover; display:block; }
.player-cover-placeholder { width:100%; height:160px; background:linear-gradient(135deg, #f7f5f2 0%, #ede8e2 100%); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.player-cover-placeholder::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(200,16,46,.08) 0%, transparent 70%); }
.player-cover-placeholder .placeholder-wing { width:140px; opacity:.12; filter:saturate(0); position:relative; z-index:1; }

.player-body { padding:24px 28px; }
.player-id { font-family:'DM Mono',monospace; font-size:10px; color:var(--red); letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; }
.player-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; line-height:1.1; margin-bottom:12px; color:var(--text); }
.player-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.meta-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.5px; background:var(--surface2); border:1.5px solid var(--border); color:var(--muted); }
.meta-chip.hi { color:var(--red); border-color:var(--red-mid); background:var(--red-soft); }

/* AUDIO WRAP */
.audio-wrap { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:16px; }
.audio-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
#mainAudio { width:100%; accent-color:var(--red); display:block; }
.audio-status { margin-top:8px; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; display:flex; align-items:center; gap:6px; }
.audio-status .dot { width:6px; height:6px; border-radius:50%; background:var(--border); transition:background .3s; flex-shrink:0; }
.audio-status.playing .dot { background:var(--playing); animation:blink 1.2s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.audio-status.playing .status-msg { color:var(--playing); font-weight:600; }

.player-links { display:flex; gap:8px; flex-wrap:wrap; }
.ext-link { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:7px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); text-decoration:none; font-size:12px; font-weight:600; transition:all .2s; }
.ext-link:hover { border-color:var(--red); color:var(--red); background:var(--red-soft); }

/* SECTION CARD */
.section-card { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:24px 28px; margin-bottom:16px; }
.section-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--red); letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }
.desc-text { font-size:14px; line-height:1.85; color:var(--muted); }

/* PROGRAMS */
.programs-list { display:flex; flex-direction:column; gap:12px; }
.program-item { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color .2s; }
.program-item:hover { border-color:var(--red-mid); }

.program-header { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; }
.prog-ts-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:7px;
  border:1.5px solid var(--red-mid); background:var(--red-soft); color:var(--red);
  font-family:'DM Mono',monospace; font-size:11px;
  cursor:pointer; transition:all .2s; flex-shrink:0; white-space:nowrap;
  font-weight:600;
}
.prog-ts-btn:hover { background:var(--red); border-color:var(--red); color:white; }
.prog-ts-btn.active { background:var(--playing); border-color:var(--playing); color:white; }

.prog-info { flex:1; min-width:0; }
.prog-name { font-weight:700; font-size:14px; color:var(--text); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.prog-announcer { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; padding:2px 8px; border-radius:4px; background:var(--red-soft); color:var(--red); border:1px solid var(--red-mid); }
.prog-topic { font-size:12px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.prog-chevron { color:var(--muted); font-size:11px; transition:transform .2s; flex-shrink:0; }
.program-item.expanded .prog-chevron { transform:rotate(180deg); }
.prog-desc-wrap { display:none; padding:0 16px 16px; }
.program-item.expanded .prog-desc-wrap { display:block; }
.prog-desc { font-size:13px; line-height:1.85; color:var(--muted); border-top:1px solid var(--border); padding-top:14px; }

/* NO DESC */
.no-desc-note { padding:28px; text-align:center; color:var(--muted); font-size:13px; background:var(--surface2); border-radius:10px; border:1.5px dashed var(--border); }

/* FOOTER */
.site-footer { text-align:center; padding:18px 24px; border-top:1px solid var(--border); background:var(--surface); margin-top:20px; }
.footer-icons { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:8px; }
.footer-icons a { opacity:.45; transition:opacity .2s, transform .2s; display:flex; }
.footer-icons a:hover { opacity:1; transform:scale(1.1); }
.footer-copy { font-size:10px; color:var(--muted); }

@media(max-width:600px) {
  main { padding:20px 14px 40px; }
  .player-body { padding:18px 16px; }
  .player-title { font-size:22px; }
  .section-card { padding:18px 16px; }
  .prog-topic { display:none; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="./index.html">
      <img src="./madyapadma-voice-of-trisma.svg" alt="Voice of Trisma" onerror="this.style.display='none'">
    </a>
    <div class="nav-links">
      <a class="nav-link" href="stream.html">🔴 Live</a>
      <a class="nav-back" href="archive.html">← Arsip</a>
    </div>
  </div>
</nav>

<main>
  <div id="pageLoading">
    <div class="big-spinner"></div>
    <p style="color:var(--muted);font-size:13px">Memuat rekaman…</p>
  </div>
  <div id="pageError">
    <div class="err-icon">📭</div>
    <p style="font-size:16px;font-weight:700">Rekaman tidak ditemukan</p>
    <p style="color:var(--muted);font-size:13px;margin-top:8px" id="errMsg"></p>
    <a href="archive.html" style="display:inline-block;margin-top:20px;color:var(--red);font-size:13px;font-weight:600">← Kembali ke Arsip</a>
  </div>

  <div id="pageContent">
    <!-- Player Section -->
    <div class="player-section" id="playerSection">
      <div class="player-cover-placeholder" id="coverArea">
        <img class="placeholder-wing" src="./madyapadma.png" alt="" onerror="this.style.display='none'">
      </div>
      <div class="player-body">
        <div class="player-id" id="recordId">—</div>
        <h1 class="player-title" id="recordTitle">—</h1>
        <div class="player-meta" id="recordMeta"></div>
        <div class="audio-wrap">
          <div class="audio-label">Pemutar Audio</div>
          <audio id="mainAudio" controls preload="none"></audio>
          <div class="audio-status" id="audioStatus">
            <span class="dot"></span>
            <span class="status-msg">Siap diputar</span>
          </div>
        </div>
        <div class="player-links" id="playerLinks"></div>
      </div>
    </div>

    <!-- Description -->
    <div class="section-card" id="descSection" style="display:none">
      <div class="section-label">Deskripsi Siaran</div>
      <p class="desc-text" id="descText"></p>
    </div>

    <!-- Programs -->
    <div class="section-card" id="programsSection" style="display:none">
      <div class="section-label">Segmen Program</div>
      <div class="programs-list" id="programsList"></div>
    </div>

    <div class="no-desc-note" id="noDescNote" style="display:none">
      📄 Deskripsi siaran belum tersedia untuk rekaman ini.
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-icons">
    <a href="https://github.com/Sparkplugx1904/VOT-Denpasar" target="_blank" title="GitHub">
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" width="20" height="20" style="filter:brightness(0);">
    </a>
    <a href="https://madyapadma-online.com/" target="_blank" title="Madyapadma Online">
      <img src="./madyapadma.svg" alt="Madyapadma" width="28" style="filter:brightness(0);" onerror="this.style.display='none'">
    </a>
    <a href="https://i.klikhost.com/cp/widgets/player/?p=8502&type=shark" target="_blank" title="KBRF Madyapadma">
      <img src="./kbrf.svg" alt="KBRF" width="20" style="filter:brightness(0);" onerror="this.style.display='none'">
    </a>
    <a href="https://archive.org/details/@16_i_gede_ananda_pradnyana" target="_blank" title="Archive.org">
      <img src="./archive-org.svg" alt="Archive.org" width="20" style="filter:brightness(0);" onerror="this.style.display='none'">
    </a>
  </div>
  <p class="footer-copy">&copy; <script>document.write(new Date().getFullYear())</script> VOT Denpasar &middot; Madyapadma Journalistic Park</p>
</footer>

<script>
const urlParams = new URLSearchParams(location.search);
const ITEM_ID   = urlParams.get('id');
const audio     = document.getElementById('mainAudio');
const audioStat = document.getElementById('audioStatus');
let currentProgBtn = null;

if (!ITEM_ID) showError('Parameter ?id= tidak ditemukan.');
else loadItem(ITEM_ID);

async function loadItem(id) {
  try {
    const metaRes = await fetch(`https://archive.org/metadata/${id}`);
    if (!metaRes.ok) throw new Error(`Metadata tidak ditemukan (${metaRes.status})`);
    const meta  = await metaRes.json();
    const files = meta.files||[]; const iaMeta = meta.metadata||{};
    const mp3File = files.find(f=>(f.format||'').toLowerCase().includes('mp3'))||files.find(f=>(f.name||'').toLowerCase().endsWith('.mp3'));
    const mp3Url  = mp3File ? `https://archive.org/download/${id}/${encodeURIComponent(mp3File.name)}` : null;
    let descData = null;
    const descFile = files.find(f=>f.name==='description.json');
    if (descFile) { try { const dr=await fetch(`https://archive.org/download/${id}/description.json`); if(dr.ok) descData=await dr.json(); } catch(_){} }
    renderHeader(id, iaMeta, mp3Url, descData);
    renderDescription(descData);
    renderPrograms(descData);
    document.getElementById('pageLoading').style.display='none';
    document.getElementById('pageContent').style.display='block';
    document.title = (descData?.title||iaMeta.title||id) + ' · VOT Radio';
  } catch(e) { showError(e.message); }
}

function renderHeader(id, meta, mp3Url, descData) {
  document.getElementById('recordId').textContent    = id;
  document.getElementById('recordTitle').textContent = descData?.title || meta.title || id;
  const coverArea = document.getElementById('coverArea');
  const img = new Image();
  img.src = `https://archive.org/services/img/${id}`;
  img.onload = () => { coverArea.innerHTML=''; img.className='player-cover'; coverArea.appendChild(img); };
  const metaEl = document.getElementById('recordMeta');
  if (meta.publicdate) { const pub=new Date(meta.publicdate); const ch=document.createElement('span'); ch.className='meta-chip hi'; ch.textContent=`📅 ${pub.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}`; metaEl.appendChild(ch); }
  if (meta.creator) { const c=Array.isArray(meta.creator)?meta.creator.join(', '):meta.creator; const ch=document.createElement('span'); ch.className='meta-chip'; ch.textContent=`🎙 ${c}`; metaEl.appendChild(ch); }
  if (mp3Url) {
    audio.src=mp3Url;
    audio.addEventListener('play',    ()=>setAudioStatus('Memutar…',false));
    audio.addEventListener('playing', ()=>setAudioStatus('Sedang diputar',true));
    audio.addEventListener('pause',   ()=>setAudioStatus('Dijeda',false));
    audio.addEventListener('ended',   ()=>{setAudioStatus('Selesai',false); if(currentProgBtn) currentProgBtn.classList.remove('active');});
    audio.addEventListener('timeupdate', syncTimestamp);
  } else { audio.disabled=true; setAudioStatus('File audio tidak ditemukan',false); }
  const linksEl=document.getElementById('playerLinks');
  linksEl.innerHTML=`<a class="ext-link" href="https://archive.org/details/${id}" target="_blank">↗ Archive.org</a>${mp3Url?`<a class="ext-link" href="${mp3Url}" download>⬇ Unduh MP3</a>`:''}`;
}
function setAudioStatus(msg, playing) { audioStat.className='audio-status'+(playing?' playing':''); audioStat.querySelector('.status-msg').textContent=msg; }

function renderDescription(data) {
  if (!data?.description) { checkNoDesc(data); return; }
  document.getElementById('descSection').style.display='block';
  document.getElementById('descText').textContent=data.description;
}
function checkNoDesc(data) { if(!data||(!data.description&&!data.programs?.length)) document.getElementById('noDescNote').style.display='block'; }

function renderPrograms(data) {
  if (!data?.programs?.length) return;
  document.getElementById('programsSection').style.display='block';
  const listEl=document.getElementById('programsList');
  data.programs.forEach((prog,idx)=>{
    const item=document.createElement('div'); item.className='program-item';
    const tsSeconds=parseTimestamp(prog.timestamp);
    const tsDisplay=formatTs(tsSeconds);
    item.innerHTML=`
      <div class="program-header" onclick="toggleProg(this.closest('.program-item'))">
        <button class="prog-ts-btn" data-seconds="${tsSeconds}" onclick="seekTo(event,${tsSeconds},this)" title="Skip ke ${tsDisplay}">
          ⏩ ${tsDisplay}
        </button>
        <div class="prog-info">
          <div class="prog-name">
            ${prog.program||'Program '+(idx+1)}
            ${prog.announcer?`<span class="prog-announcer">@${prog.announcer}</span>`:''}
          </div>
          ${prog.topic?`<div class="prog-topic">${prog.topic}</div>`:''}
        </div>
        <span class="prog-chevron">▼</span>
      </div>
      <div class="prog-desc-wrap">
        <div class="prog-desc">${prog.description||'Tidak ada deskripsi.'}</div>
      </div>`;
    listEl.appendChild(item);
  });
}

function parseTimestamp(ts) {
  if (!ts) return 0;
  const clean=ts.replace(',','.').split('.')[0];
  const parts=clean.split(':').map(Number);
  if(parts.length===3) return parts[0]*3600+parts[1]*60+parts[2];
  if(parts.length===2) return parts[0]*60+parts[1];
  return parseInt(parts[0])||0;
}
function formatTs(secs) {
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function seekTo(event, seconds, btn) {
  event.stopPropagation();
  const go=()=>{ audio.currentTime=seconds; audio.play().catch(()=>{}); };
  if(audio.readyState>0) go();
  else { audio.addEventListener('loadedmetadata',go,{once:true}); audio.load(); }
  if(currentProgBtn) currentProgBtn.classList.remove('active');
  currentProgBtn=btn; btn.classList.add('active');
}
function syncTimestamp() {
  const btns=document.querySelectorAll('.prog-ts-btn');
  const ct=audio.currentTime; let lastMatch=null;
  btns.forEach(b=>{ if(parseFloat(b.dataset.seconds)<=ct) lastMatch=b; });
  if(lastMatch!==currentProgBtn){ if(currentProgBtn) currentProgBtn.classList.remove('active'); if(lastMatch) lastMatch.classList.add('active'); currentProgBtn=lastMatch; }
}
function toggleProg(item) { item.classList.toggle('expanded'); }
function showError(msg) { document.getElementById('pageLoading').style.display='none'; document.getElementById('pageError').style.display='block'; document.getElementById('errMsg').textContent=msg; }
</script>
</body>
</html>
