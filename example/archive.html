<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOT Radio — Arsip Siaran</title>
<link rel="icon" href="./madyapadma.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --red:      #c8102e;
  --red-dark: #8f0a1f;
  --red-soft: rgba(200,16,46,.07);
  --red-mid:  rgba(200,16,46,.15);
  --bg:       #f7f5f2;
  --surface:  #ffffff;
  --surface2: #f0ece8;
  --border:   #e0d9d2;
  --text:     #1a1210;
  --muted:    #7a6e68;
  --playing:  #1a7a40;
}
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

/* NAV */
nav { position:sticky; top:0; z-index:50; background:var(--surface); border-bottom:3px solid var(--red); padding:0 24px; box-shadow:0 2px 16px rgba(200,16,46,.08); }
.nav-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; height:64px; gap:16px; }
.nav-logo { display:flex; align-items:center; text-decoration:none; }
.nav-logo img { height:44px; display:block; }
.nav-links { display:flex; gap:4px; margin-left:auto; }
.nav-link { padding:6px 14px; border-radius:6px; font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:all .2s; border-bottom:2px solid transparent; }
.nav-link:hover { color:var(--red); background:var(--red-soft); }
.nav-link.active { color:var(--red); border-bottom-color:var(--red); }

/* MAIN */
main { max-width:1100px; margin:0 auto; padding:36px 24px 120px; }

/* PAGE HEADER */
.page-header { margin-bottom:28px; border-left:4px solid var(--red); padding-left:16px; }
.page-title { font-family:'Playfair Display',serif; font-size:36px; font-weight:900; color:var(--text); line-height:1.1; }
.page-title span { color:var(--red); }
.page-sub { color:var(--muted); font-size:13px; margin-top:5px; }

/* TOOLBAR */
.toolbar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
.search-wrap { flex:1; min-width:220px; position:relative; }
.search-wrap input {
  width:100%; padding:10px 44px 10px 14px;
  background:var(--surface); border:1.5px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px;
  transition:border-color .2s;
}
.search-wrap input:focus { outline:none; border-color:var(--red); }
.search-wrap input::placeholder { color:var(--muted); }
.search-icon { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--muted); font-size:16px; background:none; border:none; transition:color .2s; }
.search-icon:hover { color:var(--red); }

.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .2s; }
.btn:hover { border-color:var(--red); color:var(--red); background:var(--red-soft); }

/* COUNT */
.count-tag { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:14px; }
.count-tag span { color:var(--red); font-weight:600; }

/* SEARCH INDICATOR */
.search-indicator { display:none; align-items:center; gap:8px; background:rgba(200,16,46,.06); border:1.5px solid var(--red-mid); border-radius:8px; padding:8px 14px; font-size:12px; color:var(--red); margin-bottom:14px; }
.search-indicator.visible { display:flex; }
.clear-search { background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; margin-left:auto; transition:color .2s; }
.clear-search:hover { color:var(--red); }

/* LIST GRID */
#list { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:14px; }

/* DATE HEADER */
.date-header { grid-column:1/-1; display:flex; align-items:center; gap:10px; margin-top:8px; }
.date-header:first-child { margin-top:0; }
.date-header-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--red); white-space:nowrap; }
.date-header-line { flex:1; height:1px; background:var(--border); }

/* ITEM CARD */
.item-card { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .2s, box-shadow .2s, transform .2s; display:flex; flex-direction:column; }
.item-card:hover { border-color:var(--red-mid); box-shadow:0 4px 20px rgba(200,16,46,.08); transform:translateY(-2px); }

.card-body { padding:14px 16px 8px; flex:1; display:flex; flex-direction:column; gap:7px; }
.card-title { font-weight:600; font-size:13px; line-height:1.45; color:var(--text); }
.card-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.5px; padding:3px 8px; border-radius:4px; }
.badge-date { background:var(--red-soft); color:var(--red); border:1px solid var(--red-mid); }
.badge-id   { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

.card-actions { display:flex; gap:8px; padding:10px 16px 14px; }
.card-btn { flex:1; padding:8px 6px; border-radius:7px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; text-align:center; }
.card-btn:hover { background:var(--red); border-color:var(--red); color:white; }
.card-btn.sec:hover { background:var(--surface2); border-color:var(--muted); color:var(--text); }

/* LOADING / EMPTY */
.loading-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
.spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:14px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { display:block; font-size:13px; animation:pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
.empty-icon { font-size:48px; margin-bottom:12px; opacity:.4; }

/* PAGINATION */
.pagination-wrap { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:32px; flex-wrap:wrap; }
.pg-btn { min-width:36px; height:36px; padding:0 10px; border-radius:7px; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.pg-btn:hover:not(:disabled) { border-color:var(--red); color:var(--red); background:var(--red-soft); }
.pg-btn.active { background:var(--red); border-color:var(--red); color:white; }
.pg-btn:disabled { opacity:.3; cursor:default; }

/* TOAST PLAYER */
#toastPlayer {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:200; width:calc(100% - 40px); max-width:640px;
  background:var(--surface); border:2px solid var(--red);
  border-radius:14px; box-shadow:0 8px 40px rgba(200,16,46,.18);
  padding:18px 22px; display:none;
  animation:slideUp .3s ease;
}
#toastPlayer.visible { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.toast-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.toast-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }
.toast-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:3px; }
.toast-close { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; flex-shrink:0; margin-left:8px; transition:color .2s; }
.toast-close:hover { color:var(--red); }
#toastAudio { width:100%; accent-color:var(--red); margin-top:4px; }
.toast-actions { display:flex; gap:10px; margin-top:10px; }
.toast-link { font-size:11px; font-weight:600; color:var(--red); text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.toast-link:hover { text-decoration:underline; }

/* FOOTER */
.site-footer { position:relative; text-align:center; padding:18px 24px; border-top:1px solid var(--border); background:var(--surface); margin-top:20px; }
.footer-icons { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:8px; }
.footer-icons a { opacity:.45; transition:opacity .2s, transform .2s; display:flex; }
.footer-icons a:hover { opacity:1; transform:scale(1.1); }
.footer-copy { font-size:10px; color:var(--muted); }

@media(max-width:600px) {
  main { padding:20px 14px 120px; }
  .page-title { font-size:26px; }
  #list { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="./index.html">
      <img src="./madyapadma-voice-of-trisma.svg" alt="Voice of Trisma" onerror="this.style.display='none'">
    </a>
    <div class="nav-links">
      <a class="nav-link" href="stream.html">🔴 Live</a>
      <a class="nav-link active" href="archive.html">📦 Arsip</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1 class="page-title">Arsip <span>Siaran</span></h1>
    <p class="page-sub">Koleksi rekaman siaran VOT Radio Denpasar dari Archive.org</p>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Cari judul, ID, atau tanggal…">
      <button class="search-icon" id="searchBtn">🔍</button>
    </div>
    <button class="btn" id="sortBtn" onclick="toggleSort()">↕ Terbaru</button>
    <button class="btn" id="refreshBtn" onclick="doRefresh()">↺ Refresh</button>
  </div>

  <div class="search-indicator" id="searchIndicator">
    <span>🔍 Hasil pencarian: <strong id="searchQ"></strong></span>
    <button class="clear-search" onclick="clearSearch()">✕</button>
  </div>

  <div class="count-tag">Menampilkan <span id="countDisplay">—</span> rekaman</div>

  <div id="list"></div>
  <div class="pagination-wrap" id="pagination"></div>
</main>

<!-- Toast Player -->
<div id="toastPlayer">
  <div class="toast-header">
    <div>
      <div class="toast-title" id="toastTitle">—</div>
      <div class="toast-sub" id="toastSub">Memuat…</div>
    </div>
    <button class="toast-close" onclick="closeToast()">✕</button>
  </div>
  <audio id="toastAudio" controls preload="none"></audio>
  <div class="toast-actions">
    <a class="toast-link" id="toastArchiveLink" href="#" target="_blank">↗ Archive.org</a>
    <a class="toast-link" id="toastDetailLink" href="#" style="margin-left:auto">📋 Detail Lengkap</a>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-icons">
    <a href="https://github.com/Sparkplugx1904/VOT-Denpasar" target="_blank" title="GitHub">
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" width="20" height="20" style="filter:brightness(0);">
    </a>
    <a href="https://madyapadma-online.com/" target="_blank" title="Madyapadma Online">
      <img src="./madyapadma.svg" alt="Madyapadma" width="28" style="filter:brightness(0);" onerror="this.style.display='none'">
    </a>
    <a href="https://i.klikhost.com/cp/widgets/player/?p=8502&type=shark" target="_blank" title="KBRF Madyapadma">
      <img src="./kbrf.svg" alt="KBRF" width="20" style="filter:brightness(0);" onerror="this.style.display='none'">
    </a>
    <a href="https://archive.org/details/@16_i_gede_ananda_pradnyana" target="_blank" title="Archive.org">
      <img src="./archive-org.svg" alt="Archive.org" width="20" style="filter:brightness(0);" onerror="this.style.display='none'">
    </a>
  </div>
  <p class="footer-copy">&copy; <script>document.write(new Date().getFullYear())</script> VOT Denpasar &middot; Madyapadma Journalistic Park</p>
</footer>

<script>
const state = { data:[], allData:[], page:1, totalPages:1, hitsPerPage:24, query:'', sortDesc:true, isSearch:false };
let pageCache = {};
const API = 'https://archive.org/services/search/beta/page_production/?page_type=account_details&page_target=@16_i_gede_ananda_pradnyana&page_elements=[%22uploads%22]';

const listEl       = document.getElementById('list');
const paginationEl = document.getElementById('pagination');
const searchInput  = document.getElementById('searchInput');
const countDisplay = document.getElementById('countDisplay');
const toastPlayer  = document.getElementById('toastPlayer');
const toastAudio   = document.getElementById('toastAudio');
const toastTitle   = document.getElementById('toastTitle');
const toastSub     = document.getElementById('toastSub');
const searchInd    = document.getElementById('searchIndicator');
const searchQ      = document.getElementById('searchQ');

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${String(d.getUTCDate()).padStart(2,'0')}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCFullYear()).slice(-2)}`;
}
function mapHit(h) {
  const id = h.fields.identifier;
  return { id, title:h.fields.title||id, publicdate:h.fields.publicdate, date:formatDate(h.fields.publicdate), url:`https://archive.org/details/${id}` };
}

async function loadJson(page=1) {
  if (pageCache[page]) { state.data=pageCache[page].data; state.page=page; state.totalPages=pageCache[page].totalPages; render(); renderPagination(); return; }
  showLoading();
  const res = await fetch(`${API}&hits_per_page=${state.hitsPerPage}&page=${page}&sort=publicdate:${state.sortDesc?'desc':'asc'}`,{cache:'no-store'});
  if (!res.ok) throw new Error('Gagal memuat data');
  const json = await res.json();
  const up = json?.response?.body?.page_elements?.uploads;
  const hits = up?.hits?.hits||[]; const total = up?.hits?.total||0;
  const data = hits.map(mapHit); const totalPages = Math.ceil(total/state.hitsPerPage);
  pageCache[page]={data,totalPages};
  state.data=data; state.page=page; state.totalPages=totalPages; state.isSearch=false; state.query='';
  render(); renderPagination();
}

async function loadAllForSearch(query) {
  showLoading();
  const first = await fetch(`${API}&hits_per_page=${state.hitsPerPage}&page=1&sort=publicdate:desc`,{cache:'no-store'});
  if (!first.ok) throw new Error('Gagal memuat data');
  const fj = await first.json();
  const up0 = fj?.response?.body?.page_elements?.uploads;
  const total = up0?.hits?.total||0; let allHits=[...(up0?.hits?.hits||[])];
  const maxP = Math.min(Math.ceil(total/state.hitsPerPage),100);
  const reqs=[]; for(let p=2;p<=maxP;p++) reqs.push(fetch(`${API}&hits_per_page=${state.hitsPerPage}&page=${p}&sort=publicdate:desc`,{cache:'no-store'}));
  const ress = await Promise.allSettled(reqs);
  for(const r of ress) if(r.status==='fulfilled'&&r.value.ok){const j=await r.value.json(); allHits=allHits.concat(j?.response?.body?.page_elements?.uploads?.hits?.hits||[]);}
  const allData = allHits.map(mapHit);
  const q = query.toLowerCase();
  const filtered = allData.filter(it=>it.title.toLowerCase().includes(q)||it.id.toLowerCase().includes(q)||it.date.toLowerCase().includes(q));
  state.allData=filtered; state.page=1; state.totalPages=Math.ceil(filtered.length/state.hitsPerPage);
  state.isSearch=true; state.query=query;
  state.data=filtered.slice(0,state.hitsPerPage);
  render(); renderPagination();
  searchQ.innerHTML=`"${query}" <span style="color:var(--muted)">(${filtered.length} hasil)</span>`;
  searchInd.classList.add('visible');
}
function loadSearchPage(page) {
  state.page=page; const s=(page-1)*state.hitsPerPage;
  state.data=state.allData.slice(s,s+state.hitsPerPage);
  render(); renderPagination();
}

function showLoading() { listEl.innerHTML=`<div class="loading-state"><div class="spinner"></div><span class="loading-text">Memuat arsip…</span></div>`; }
function render() {
  listEl.innerHTML='';
  if (!state.data.length) { listEl.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><p>Tidak ada rekaman ditemukan.</p></div>`; countDisplay.textContent='0'; return; }
  countDisplay.innerHTML=`<span>${state.data.length}</span>`;
  const groups={},gDates={};
  for(const it of state.data){ if(!groups[it.date]) groups[it.date]=[]; groups[it.date].push(it); gDates[it.date]=it.publicdate; }
  const keys=Object.keys(groups).sort((a,b)=>{const da=new Date(gDates[a]||0),db=new Date(gDates[b]||0); return state.sortDesc?db-da:da-db;});
  for(const date of keys){
    const hdr=document.createElement('div'); hdr.className='date-header';
    hdr.innerHTML=`<div class="date-header-line"></div><span class="date-header-label">📅 ${date}</span><div class="date-header-line"></div>`;
    listEl.appendChild(hdr);
    const grp=groups[date].sort((a,b)=>state.sortDesc?(b.id||'').localeCompare(a.id||''):(a.id||'').localeCompare(b.id||''));
    for(const it of grp){
      const card=document.createElement('div'); card.className='item-card';
      card.innerHTML=`
        <div class="card-body">
          <div class="card-title">${it.title}</div>
          <div class="card-meta">
            <span class="badge badge-date">${it.date}</span>
            <span class="badge badge-id">${it.id}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="card-btn" data-id="${it.id}" data-title="${it.title.replace(/"/g,'&quot;')}" onclick="playItem(this)">▶ Putar</button>
          <button class="card-btn sec" onclick="window.location.href='player.html?id=${it.id}'">📋 Detail</button>
          <button class="card-btn sec" onclick="window.open('${it.url}','_blank')">↗</button>
        </div>`;
      listEl.appendChild(card);
    }
  }
}
function renderPagination() {
  paginationEl.innerHTML=''; if(state.totalPages<=1) return;
  const make=(label,page,disabled,active)=>{const b=document.createElement('button'); b.className='pg-btn'+(active?' active':''); b.textContent=label; b.disabled=disabled; b.onclick=()=>{if(state.isSearch)loadSearchPage(page); else loadJson(page); window.scrollTo({top:0,behavior:'smooth'});}; return b;};
  paginationEl.appendChild(make('‹',state.page-1,state.page===1));
  const s=Math.max(1,state.page-2),e=Math.min(state.totalPages,state.page+2);
  for(let i=s;i<=e;i++) paginationEl.appendChild(make(i,i,false,i===state.page));
  paginationEl.appendChild(make('›',state.page+1,state.page===state.totalPages));
}

async function playItem(btn) {
  const id=btn.dataset.id, title=btn.dataset.title;
  toastTitle.textContent=title; toastSub.textContent='Memuat…'; toastAudio.src='';
  document.getElementById('toastArchiveLink').href=`https://archive.org/details/${id}`;
  document.getElementById('toastDetailLink').href=`player.html?id=${id}`;
  toastPlayer.classList.add('visible');
  try {
    const mp3=await resolveMp3(id);
    if(mp3){toastAudio.src=mp3; toastAudio.play().catch(()=>{}); toastSub.textContent=id;}
    else toastSub.textContent='File MP3 tidak ditemukan';
  } catch(e){toastSub.textContent='Error: '+e.message;}
}
async function resolveMp3(id) {
  const res=await fetch(`https://archive.org/metadata/${id}`); if(!res.ok) return null;
  const meta=await res.json(); const files=meta.files||[];
  const f=files.find(f=>(f.format||'').toLowerCase().includes('mp3'))||files.find(f=>(f.name||'').toLowerCase().endsWith('.mp3'));
  return f?`https://archive.org/download/${id}/${encodeURIComponent(f.name)}`:null;
}
function closeToast(){toastAudio.pause(); toastAudio.src=''; toastPlayer.classList.remove('visible');}

function toggleSort(){state.sortDesc=!state.sortDesc; pageCache={}; document.getElementById('sortBtn').textContent=state.sortDesc?'↕ Terbaru':'↕ Terlama'; if(state.isSearch)loadAllForSearch(state.query); else loadJson(state.page);}
async function doRefresh(){const btn=document.getElementById('refreshBtn'); btn.disabled=true; btn.textContent='↻ Memuat…'; pageCache={}; try{if(state.isSearch&&state.query)await loadAllForSearch(state.query); else await loadJson(state.page);}finally{btn.disabled=false; btn.textContent='↺ Refresh';}}

function clearSearch(){searchInput.value=''; searchInd.classList.remove('visible'); state.isSearch=false; state.query=''; pageCache={}; loadJson(1); const u=new URL(location.href); u.searchParams.delete('title'); history.replaceState({},'',u.toString());}

document.getElementById('searchBtn').onclick=doSearch;
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
function doSearch(){
  const q=searchInput.value.trim();
  listEl.innerHTML=''; pageCache={}; state.allData=[]; state.page=1;
  if(q){loadAllForSearch(q); const u=new URL(location.href); u.searchParams.set('title',q); history.replaceState({},'',u.toString());}
  else clearSearch();
}

const urlP=new URLSearchParams(location.search);
const initQ=urlP.get('title');
if(initQ){searchInput.value=initQ; loadAllForSearch(initQ);}
else loadJson(1).catch(e=>{listEl.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;});
</script>
</body>
</html>
