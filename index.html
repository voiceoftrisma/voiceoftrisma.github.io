<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice of Trisma</title>
    <link rel="icon" href="./../assets/madyapadma.svg" type="image/png">

    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Main Application Stylesheet -->
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="sidebar-placeholder"></div>

    <!-- Main Content Layout -->
    <div class="main-content">
        <div id="navbar-placeholder"></div>

        <!-- Animated Hero Section -->
        <div class="hero-section glass-panel">
            <div class="live-badge" id="liveBadge">
                <span class="pulse"></span> LIVE NOW
            </div>
            <h1>Radio Voice of Trisma</h1>
            <p>Radio Voice of Trisma adalah sebuah radio komunitas yang berbasis di SMA Negeri 3 Denpasar.
                Dikelola oleh siswa-siswi Madyapadma Journalistic Park.</p>

            <div class="stats-row">
                <div class="stat-item">
                    <i class="fa-solid fa-headphones"></i>
                    <span id="peakListenersCount"><i class="fa-solid fa-circle-notch fa-spin"></i> Mendengarkan</span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-music"></i>
                    <span>Kualitas 128kbps</span>
                </div>
            </div>
        </div>
        <!-- Static Cards Removed as requested -->

        <!-- Audio Player Bar (Glassmorphism + Neon) -->
        <div class="audio-player-bar">
            <!-- Progress bar hidden for stream -->
            <input type="range" class="progress-bar-top" style="display: none;" min="0" max="100" value="45">

            <div class="player-center player-info">
                <div class="img-thumb-container">
                    <div class="img-thumb glass-panel thumb-offline" id="playerThumb">
                        <img src="./assets/madyapadma.svg" alt="Logo Madyapadma" width="30">
                    </div>
                </div>
                <div class="song-title-wrapper">
                    <div class="song-title">Siaran Langsung Voice of Trisma</div>
                    <div class="song-program" id="currentProgram">Sedang Offline...</div>
                    <div class="next-program" id="nextProgram" style="display: none;"></div>
                </div>
            </div>

            <div class="player-controls">
                <!-- Volume Slider moved to the left of backward step -->
                <div class="volume-container">
                    <button class="icon-btn" id="volumeBtn" title="Volume">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <div class="volume-slider-wrapper glass-panel" id="volumeSliderWrapper">
                        <input type="range" class="volume-slider" min="0" max="100" value="100">
                    </div>
                </div>

                <button class="icon-btn" title="Mundur 10 Detik">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button class="play-pause-btn" id="playPauseBtn" title="Play/Pause">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path class="morph-path" fill="#ffffff" d="M 8 5 L 19 12 L 8 19 Z" />
                    </svg>
                </button>
                <button class="icon-btn" title="Maju 10 Detik">
                    <i class="fa-solid fa-forward-step"></i>
                </button>

                <!-- Archive Link moved to the right of forward step -->
                <a href="archive" class="icon-btn" title="Arsip Siaran"
                    style="display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-box-archive"></i>
                </a>
            </div>

            <div class="player-tools">
                <!-- Time text hidden for stream -->
            </div>
        </div>

        <!-- Hidden Audio Element for Live Stream -->
        <audio id="mainAudio" src="http://i.klikhost.com:8502/stream" preload="none" style="display: none;"></audio>

        <script src="load-layout.js"></script>
        <script src="script.js"></script>
        <script>
            (function () {
                var input = document.getElementById('q');
                var btn = document.getElementById('mainSearchBtn');

                function goSearch() {
                    var q = input.value.trim();
                    if (q) {
                        window.location.href = 'archive?query=' + encodeURIComponent(q);
                    }
                }

                btn.addEventListener('click', goSearch);
                input.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') goSearch();
                });
            })();
        </script>
</body>
</body>

</html>
